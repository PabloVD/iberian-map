<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mapa de yacimientos de la cultura ibérica</title>
  <meta name="description" content="Mapa interactivo de los yacimientos arqueológicos de la cultura ibérica prerromana en la península ibérica." />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map"></div>

  <header id="topbar">
    <h1 id="title">Yacimientos de la cultura ibérica</h1>
    <span id="count" class="count"></span>
  </header>

  <div id="controls">
    <div class="row">
      <input id="search" type="search" autocomplete="off" />
      <div id="lang" class="lang-toggle">
        <button data-lang="es">ES</button><button data-lang="ca">CA</button>
      </div>
    </div>
    <div id="filters"></div>
  </div>

  <aside id="panel" class="hidden" aria-live="polite">
    <button id="panel-close" aria-label="Cerrar">×</button>
    <div id="panel-content"></div>
  </aside>

  <div id="lightbox" class="hidden">
    <button class="lb-close" aria-label="Cerrar">×</button>
    <button class="lb-nav lb-prev" aria-label="Anterior">‹</button>
    <button class="lb-nav lb-next" aria-label="Siguiente">›</button>
    <figure>
      <img id="lb-img" src="" alt="" />
      <figcaption id="lb-cap"></figcaption>
    </figure>
  </div>

  <footer id="credits">
    <a href="https://www.wikidata.org" target="_blank" rel="noopener">Wikidata</a> ·
    <a href="https://commons.wikimedia.org" target="_blank" rel="noopener">Wikimedia Commons</a> ·
    <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="map.js"></script>
</body>
</html>
